<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=JetBrains+Mono&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto+Mono&display=swap"
      rel="stylesheet"
    />
    <title>Typing Game</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #2d2d2d;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
      }
      #startScreen {
        position: absolute;
        background-image: url("cover_game.png");
        background-size: cover;
        background-position: center;

        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 10px;

        height: 100vh;
        width: 100%;
        transition: transform 0.7s ease-in-out;
      }
      #startScreen.hide {
        transform: translateY(-100%); /* 🔥 เลื่อนขึ้น */
      }
      #gameScreen {
        position: absolute;
        transform: translateY(100%);

        background-image: url("game_screen.png");
        background-size: cover;
        background-position: center;

        display: flex;
        /* flex-direction: column; */
        align-items: center;
        justify-content: center;
        opacity: 0;
        height: 100vh;
        width: 100%;
        transition: transform 0.7s ease-in-out;
      }
      #gameScreen.show {
        opacity: 1;
        transform: translateY(0); /* 🔥 เลื่อนขึ้นมาแทน */
      }
      .title-wrapper {
        position: relative;
        display: inline-block;
      }
      .title {
        font-family: "Fredoka One", cursive;
        font-size: 120px;
        color: #ffa726;
        text-shadow:
          4px 4px 0 #ffffff,
          8px 8px 0 #e65100;
        margin-bottom: 40px;

        animation: bounce 2s infinite;
      }
      .subtitle {
        position: absolute;
        bottom: 0;
        right: 20px;

        font-family: "Fredoka One", cursive;
        font-size: 65px;
        color: #4fc3f7;
        text-shadow:
          3px 3px 0 #ffffff,
          6px 6px 0 #1976d2;
        margin-bottom: -35px;

        animation: bounce 2s infinite;
      }
      .card {
        background: rgba(140, 30, 204, 0.8);
        backdrop-filter: blur(8px);
        color: white;
        border: 3px solid #e9b2ff;
        border-radius: 20px;
        box-shadow:
          0 0 10px #e9b2ff,
          0 0 20px #e9b2ff,
          inset 0 0 10px rgba(0, 255, 224, 0.3);
        padding: 30px;
        width: 350px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: 0.3s;
      }
      h1 {
        font-family: "Press Start 2P", cursive;
        font-size: 30px;
        margin-bottom: 10px;
      }
      p {
        font-family: "Poppins", sans-serif;
        font-size: 1.4rem;
        /* margin: 5px 0; */
      }
      #word {
        font-family: "JetBrains Mono", monospace;
        font-size: 3.2rem;
        font-weight: bold;
        margin: 20px;
        padding: 10px 20px;
        border-radius: 5px;
        display: none;
      }
      #input {
        font-family: "JetBrains Mono", monospace;
        font-size: 1.5rem;
        padding: 10px;
        margin: 10px;
        border: none;
        border-radius: 5px;
        outline: none;
        display: none;
      }
      #PressStart {
        font-family: "Fredoka One", cursive;
        font-size: 28px;
        margin-top: 35px;
        color: #ffffff;
        text-shadow: 2px 2px 5px #000;
        animation: blink 1s infinite;
        cursor: pointer;
      }
      #PressStart:hover {
        color: #ffcc00;
      }
      .stats {
        display: flex;
        justify-content: space-between;
        width: 300px;
      }
      .stats p {
        color: #ff3cac;
        text-shadow: 0 0 5px #ff3cac;
        font-size: 1.5rem;
        font-weight: bold;
      }
      #timeBarContainer {
        width: 300px;
        height: 18px;
        background: #444;
        border-radius: 8px;
        margin: 15px 0;
        display: none;
        overflow: hidden;
        /* direction: LTR;  ค่าเริ่มต้นอยู่แล้วไม่ต้อง set*/
      }
      #timeBar {
        width: 100%;
        height: 100%;
        background: green;
        border-radius: 8px;
        transition:
          width 0.2s linear,
          background-color 0.3s ease;
        left: 0;
      }
      @keyframes bounce {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
        }
      }
      @keyframes shake {
        0% {
          transform: translateX(0px);
        }
        100% {
          transform: translateX(0px);
        }
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
    </style>
  </head>
  <body>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <div id="startScreen">
      <div class="title-wrapper">
        <div class="subtitle">Game</div>
        <div class="title">Typing</div>
      </div>
      <p id="PressStart">----- Press to Start -----</p>
    </div>
    <div id="gameScreen">
      <div class="card">
        <h1>Typing Game</h1>
        <p
          id="text"
          style="color: rgba(36, 159, 241, 0.932); text-align: center"
        >
          Type as many words as you can until time runs out!
        </p>
        <p>🏆 High Score : <span id="highScore">0</span></p>
        <div id="timeBarContainer">
          <div id="timeBar"></div>
        </div>
        <div class="stats">
          <p>Score : <span id="score">0</span></p>
          <p>Time left : <span id="time">60</span></p>
        </div>
        <div>
          <p
            style="
              color: #00ffea;
              text-shadow: 0 0 5px #00ffea;
              font-size: 2rem;
              margin: 15px;
            "
          >
            <span id="combo">0</span>x
          </p>
        </div>
        <div id="word"></div>
        <input
          type="text"
          id="input"
          placeholder="Type the word here..."
          disabled
        />
      </div>
    </div>
    <audio
      id="correctSound"
      src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"
    ></audio>
    <audio
      id="wrongSound"
      src="https://assets.mixkit.co/active_storage/sfx/1462/1462-preview.mp3"
    ></audio>
    <audio
      id="warningSound"
      src="https://assets.mixkit.co/active_storage/sfx/989/989-preview.mp3"
    ></audio>
    <script>
      const words = [
        "population",
        "chatgpt",
        "computer",
        "education",
        "software",
        "typing",
        "internet",
        "keyboard",
        "programming",
        "javascript",
        "technology",
        "project",
      ];

      let time = 60;
      let score = 0,
        wrongLetters = 0,
        wrongWords = 0,
        combo = 0;
      highScore = 0;
      let currentWord = "";
      let warned = false;

      const startScreen = document.getElementById("startScreen");
      const gameScreen = document.getElementById("gameScreen");
      const wordElement = document.getElementById("word");
      const inputElement = document.getElementById("input");
      const PressStart = document.getElementById("PressStart");
      const textElement = document.getElementById("text");
      const timeElement = document.getElementById("time");
      const scoreElement = document.getElementById("score");
      const comboElement = document.getElementById("combo");
      const highScoreElement = document.getElementById("highScore");
      const correctSound = document.getElementById("correctSound");
      const wrongSound = document.getElementById("wrongSound");
      const timeBarContainer = document.getElementById("timeBarContainer");
      const timeBar = document.getElementById("timeBar");

      function getRandomWord() {
        return words[parseInt(Math.random() * words.length)];
      }

      function startGame() {
        startScreen.classList.add("hide");
        gameScreen.classList.add("show");

        score = 0;
        combo = 0;
        time = 60;
        inputElement.value = "";
        inputElement.disabled = false;
        textElement.style.display = "none";
        wordElement.style.display = "block";
        inputElement.style.display = "block";
        timeBarContainer.style.display = "block";
        timeBar.style.width = "100%";
        timeBar.style.backgroundColor = "#2ecc71";

        updateWord();
        updateScore();
        updateTime();
        ShowHighScore();
        updateCombo();

        const timer = setInterval(() => {
          time--;
          updateTime();
          updateTimeBar();
          if (time <= 0) {
            clearInterval(timer);
            endGame();
          }
        }, 1000);
      }
      function updateWord() {
        currentWord = getRandomWord();
        wordElement.textContent = currentWord.toUpperCase();
      }

      function updateScore() {
        scoreElement.textContent = score;
      }

      function updateCombo() {
        comboElement.textContent = combo;
      }

      function updateTime() {
        timeElement.textContent = time;
      }
      function updateTimeBar() {
        const percent = (time / 60) * 100;
        timeBar.style.width = percent + "%";

        // สีตามช่วงเวลา
        if (time > 40) {
          timeBar.style.backgroundColor = "#2ecc71"; // เขียว
        } else if (time > 30) {
          timeBar.style.backgroundColor = "#f1c40f"; // เหลือง
        } else if (time > 20) {
          timeBar.style.backgroundColor = "#e67e22"; // ส้ม
        } else if (time < 10) {
          timeBar.style.backgroundColor = "#e74c3c"; // แดง
          if (!warned) {
            timeBar.style.animation = "shake 0.4s infinite";
            warningSound.currentTime = 0;
            warningSound.play();
            warned = true;
          }
        }
      }

      function ShowHighScore() {
        const savedscore = localStorage.getItem("myHighScore");
        if (savedscore) {
          highScore = parseInt(savedscore);
          highScoreElement.textContent = highScore;
        }
      }

      function updateHighScore() {
        if (score > highScore) {
          highScore = score;
          localStorage.setItem("myHighScore", highScore);
          highScoreElement.textContent = highScore;
        }
      }

      function endGame() {
        inputElement.disabled = true;
        warned = false;
        textElement.style.display = "block";
        wordElement.style.display = "none";
        inputElement.style.display = "none";
        timeBarContainer.style.display = "none";

        alert(`Game over! Your score: ${score}`);

        startScreen.classList.remove("hide");
        gameScreen.classList.remove("show");

        updateHighScore();
        score = 0;
        time = 60;
        updateScore();
        updateTime();
      }
      function highlightWord(typedWord) {
        let highlightedText = "";
        for (let i = 0; i < currentWord.length; i++) {
          if (i < typedWord.length) {
            if (typedWord[i] === currentWord[i]) {
              highlightedText += `<span style="background-color: #2ecc71; color: white; padding: 2px;">${currentWord[i]}</span>`;
            } else {
              highlightedText += `<span style="background-color: #e74c3c; color: white; padding: 2px;">${currentWord[i]}</span>`;
            }
          } else {
            highlightedText += `<span style="background-color: transparent; color: white; padding: 2px;">${currentWord[i]}</span>`;
          }
        }

        wordElement.innerHTML = highlightedText.toUpperCase();
      }

      inputElement.addEventListener("input", () => {
        const typedWord = inputElement.value.toLowerCase();
        wrongLetters = 0;

        for (let i = 0; i < typedWord.length; i++) {
          if (typedWord[i] !== currentWord[i]) {
            wrongLetters++;
          }
        }

        highlightWord(typedWord, wrongLetters > 0);

        if (
          typedWord === currentWord ||
          (typedWord.length === currentWord.length && wrongLetters === 1)
        ) {
          correctSound.currentTime = 0;
          correctSound.play();
          combo++;
          updateCombo();
          // score++;
          score += combo;
          updateScore();
          inputElement.value = "";
          updateWord();
          wrongWords = 0;
        }
        if (wrongLetters >= 2) {
          wrongSound.currentTime = 0;
          wrongSound.play();
          combo = 0;
          updateCombo();
          wrongWords++;
          inputElement.value = "";
          score = Math.max(0, score - 1);
          updateScore();
          updateWord();
          wrongWords = 0;
        }
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !gameScreen.classList.contains("show")) {
          startGame();
        }
      });
      PressStart.addEventListener("click", startGame);
      localStorage.removeItem("myHighScore");
    </script>
  </body>
</html>
